<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="qg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FB3595"/>
      <stop offset="100%" stop-color="#4589F5"/>
    </linearGradient>
    <linearGradient id="wave" x1="8" y1="16" x2="24" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FB3595"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#4589F5"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14" stroke="url(#qg)" stroke-width="2.2" fill="none"/>
  <!-- Audio waveform inside — 3 bars -->
  <rect x="10" y="12" width="2.4" height="8" rx="1.2" fill="url(#wave)"/>
  <rect x="14.8" y="9" width="2.4" height="14" rx="1.2" fill="url(#wave)"/>
  <rect x="19.6" y="11" width="2.4" height="10" rx="1.2" fill="url(#wave)"/>
  <!-- Q tail — diagonal slash -->
  <line x1="21" y1="23" x2="27" y2="29" stroke="url(#qg)" stroke-width="2.4" stroke-linecap="round"/>
</svg>
